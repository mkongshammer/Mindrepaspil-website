<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320">
<title>Velkomst</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #1a2744; --secondary: #4a7cc9; --bgStart: #dce6f5;
    --text: #5a6378; --border: #c5cad4; --white: #ffffff; --cardBg: #F4F6FA;
  }
  html, body { width: 320px; height: 693px; overflow: hidden; background: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; }

  .phone {
    width: 320px; height: 693px;
    background: #1C1C1E; border-radius: 32px;
    position: relative;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset, 0 0 0 4px #252527 inset;
  }
  .phone::before {
    content: ''; position: absolute; right: -4px; top: 116px;
    width: 4px; height: 52px; background: #2a2a2c; border-radius: 0 3px 3px 0;
  }
  .phone::after {
    content: ''; position: absolute; left: -4px; top: 92px;
    width: 4px; height: 34px; background: #2a2a2c; border-radius: 3px 0 0 3px;
    box-shadow: 0 46px 0 #2a2a2c;
  }

  .screen {
    position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
    background: linear-gradient(180deg, #e8f1fb 0%, #ffffff 80px);
    border-radius: 26px; overflow: hidden;
  }

  .di {
    position: absolute; top: 9px; left: 50%; transform: translateX(-50%);
    width: 102px; height: 29px; background: #1C1C1E; border-radius: 15px; z-index: 10;
  }

  .s-layout {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    padding-top: 44px;
  }

  .logo-section {
    flex: 3;
    display: flex; align-items: center; justify-content: center;
    padding-top: 8px;
  }
  .logo-section img {
    height: 320px; width: auto; max-width: 250px; object-fit: contain;
  }
  .logo-fallback {
    font-size: 12px; font-weight: 800; color: var(--primary); letter-spacing: -0.3px;
  }

  .tagline {
    font-size: 10.5px; color: var(--text); text-align: center;
    line-height: 1.6; padding: 0 22px 10px;
  }

  .spacer { flex: 1; }

  .btns {
    padding: 0 19px 16px;
  }
  .btn-p {
    width: 100%; height: 40px; background: var(--primary); border-radius: 23px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
  }
  .btn-o {
    width: 100%; height: 40px; background: transparent; border-radius: 23px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--primary);
    border: 1.5px solid var(--primary); margin-top: 8px;
  }
  .footer-url {
    font-size: 9px; color: var(--border); text-align: center;
    margin-top: 10px; text-decoration: underline;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="di"></div>

    <div class="s-layout">
      <div class="logo-section">
        <img
          src="../../MindrePa_Spil_logo_transparent.png"
          alt="Mindre på Spil"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
        >
        <span class="logo-fallback" style="display:none;">Mindre på Spil</span>
      </div>

      <p class="tagline">Det første skridt mod større kontrol over pengespil</p>

      <div class="spacer"></div>

      <div class="btns">
        <div class="btn-p">Opret dig</div>
        <div class="btn-o">Log ind</div>
        <p class="footer-url">www.mindrepaaspil.dk</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
